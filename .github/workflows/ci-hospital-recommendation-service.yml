name: CI - hospital-recommendation-service

on:
  push:
    branches: [ "main" ]
    paths:
      - 'apps/hospital-recommendation-service/**' # ⭐ Board Service 코드가 바뀔 때만 실행!

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: hostpital-recommendation-service

# OIDC 토큰 발급을 위한 권한 설정 (필수)
permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: arn:aws:iam::<AWS_ACCOUNT_ID>:role/github-actions-ecr-role # 🚨 나중에 인프라 담당자에게 받아서 채울 부분
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build and Push Docker image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        cd apps/board-service
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG