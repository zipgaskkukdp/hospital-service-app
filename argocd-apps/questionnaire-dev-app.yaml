apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: questionnaire-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/사용자계정/Howmuch.git'
    targetRevision: main
    path: manifests/overlays/dev/questionnaire-service # 👈 경로 확인!
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true