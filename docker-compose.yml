x-node-env: &node-env
  APP_ENV: dev
  LOG_LEVEL: INFO
  TZ: Asia/Seoul
  CORS_ALLOWED_ORIGINS: http://localhost:5173
  HEALTH_CHECK_PATH: /health
  DATABASE_URL: postgresql://aicloud:%3CCHANGE_ME%3E@aws-rds-local:5432/aicloud?schema=public
  JWT_SECRET: <CHANGE_ME>
  AWS_REGION: ap-northeast-2

services:
  aws-rds-local:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: aicloud
      POSTGRES_USER: aicloud
      POSTGRES_PASSWORD: <CHANGE_ME>
    volumes:
      - aws_rds_local_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aicloud -d aicloud"]
      interval: 5s
      timeout: 3s
      retries: 10

  onprem-postgres:
    image: postgres:15-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: aicloud_sensitive
      POSTGRES_USER: aicloud
      POSTGRES_PASSWORD: <CHANGE_ME>
    volumes:
      - onprem_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aicloud -d aicloud_sensitive"]
      interval: 5s
      timeout: 3s
      retries: 10

  auth-user-service:
    build:
      context: .
      dockerfile: apps/auth-user-service/Dockerfile
    ports:
      - "8081:8081"
    environment:
      <<: *node-env
      SERVICE_NAME: auth-user-service
      PORT: 8081
      ONPREM_API_BASE_URL: http://onprem-sensitive-api:9000
      ONPREM_API_TIMEOUT_MS: 3000
      ONPREM_REQUIRED: "false"
    depends_on:
      aws-rds-local:
        condition: service_healthy
      onprem-sensitive-api:
        condition: service_started

  questionnaire-service:
    build:
      context: .
      dockerfile: apps/questionnaire-service/Dockerfile
    ports:
      - "8082:8082"
    environment:
      <<: *node-env
      SERVICE_NAME: questionnaire-service
      PORT: 8082
      ONPREM_API_BASE_URL: http://onprem-sensitive-api:9000
      ONPREM_API_TIMEOUT_MS: 3000
      ONPREM_REQUIRED: "false"
      SQS_TRIAGE_QUEUE_URL: ""
    depends_on:
      aws-rds-local:
        condition: service_healthy
      onprem-sensitive-api:
        condition: service_started

  board-service:
    build:
      context: .
      dockerfile: apps/board-service/Dockerfile
    ports:
      - "8083:8083"
    environment:
      <<: *node-env
      SERVICE_NAME: board-service
      PORT: 8083
      S3_BUCKET_NAME: ""
      S3_POST_IMAGE_PREFIX: board/posts/
      S3_PRESIGNED_URL_EXPIRE_SECONDS: 300
      CLOUDFRONT_DOMAIN: ""
    depends_on:
      aws-rds-local:
        condition: service_healthy

  ai-triage-service:
    build:
      context: .
      dockerfile: apps/ai-triage-service/Dockerfile
    ports:
      - "8084:8084"
    environment:
      <<: *node-env
      SERVICE_NAME: ai-triage-service
      PORT: 8084
      AI_PROVIDER: mock
      AI_PROCESSING_MODE: inline_mock
      BEDROCK_REGION: ap-northeast-2
      BEDROCK_MODEL_ID: ""
      BEDROCK_GUARDRAIL_ID: ""
      BEDROCK_GUARDRAIL_VERSION: ""
      S3_BUCKET_NAME: ""
      S3_REPORT_PREFIX: reports/
      S3_PRESIGNED_URL_EXPIRE_SECONDS: 300
      CLOUDFRONT_DOMAIN: ""
    depends_on:
      aws-rds-local:
        condition: service_healthy

  hospital-recommendation-service:
    build:
      context: .
      dockerfile: apps/hospital-recommendation-service/Dockerfile
    ports:
      - "8085:8085"
    environment:
      <<: *node-env
      SERVICE_NAME: hospital-recommendation-service
      PORT: 8085
      MAP_API_PROVIDER: mock
      MAP_API_KEY: ""
      MAP_API_BASE_URL: ""
      MAP_API_TIMEOUT_MS: 3000
    depends_on:
      aws-rds-local:
        condition: service_healthy

  onprem-sensitive-api:
    build:
      context: .
      dockerfile: apps/onprem-sensitive-api/Dockerfile
    ports:
      - "9000:9000"
    environment:
      APP_ENV: dev
      SERVICE_NAME: onprem-sensitive-api
      PORT: 9000
      LOG_LEVEL: INFO
      TZ: Asia/Seoul
      HEALTH_CHECK_PATH: /health
      DB_HEALTH_CHECK_PATH: /db-health
      DATABASE_URL: postgresql://aicloud:%3CCHANGE_ME%3E@onprem-postgres:5432/aicloud_sensitive
      FIELD_ENCRYPTION_KEY: <CHANGE_ME>
      ALLOWED_AWS_VPC_CIDR: 10.0.0.0/16
    depends_on:
      onprem-postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: ""
    depends_on:
      - auth-user-service
      - questionnaire-service
      - board-service
      - ai-triage-service
      - hospital-recommendation-service

volumes:
  aws_rds_local_data:
  onprem_pg_data:
